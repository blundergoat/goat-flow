# Codex CLI configuration for goat-flow
# Hooks: configured in .codex/hooks.json (not here)
# Filesystem deny: Codex permission profile below
# Command deny: guardrail hooks via PreToolUse in .codex/hooks.json

default_permissions = "goat-flow"

[features]
hooks = true

[permissions.goat-flow]
description = "goat-flow workspace editing with secret-path read denies."
extends = ":workspace"

[permissions.goat-flow.filesystem]
glob_scan_max_depth = 3

[permissions.goat-flow.filesystem.":workspace_roots"]
# Deny rules win over allow/read rules on both Codex and Claude, so a broad
# .env* deny cannot be re-opened for the sample file. Real env variants are
# denied individually so .env.example stays readable, matching the Bash deny
# hook; nonstandard variants (e.g. .env.backup) are covered by that hook.
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/.env.development" = "deny"
"**/.env.production" = "deny"
"**/.env.staging" = "deny"
"**/.env.test" = "deny"
"**/.envrc" = "deny"
"**/.env.*.local" = "deny"
"**/secrets/**" = "deny"
"**/.ssh/**" = "deny"
"**/.aws/**" = "deny"
"**/.docker/**" = "deny"
"**/.gnupg/**" = "deny"
"**/.kube/**" = "deny"
"**/credentials*" = "deny"
"**/.npmrc" = "deny"
"**/.pypirc" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.pfx" = "deny"
