<!-- ═══ Audit View ═══ -->
<div
  x-show="activeView === 'audit'"
  style="height: calc(100vh - 3.5rem); overflow-y: auto"
>
  <!-- No data empty state -->
  <div
    x-show="!report && !auditing"
    class="flex items-center justify-center"
    style="min-height: 60vh"
  >
    <div class="text-center space-y-4 max-w-md">
      <p class="text-4xl">&#128016;</p>
      <h2 class="text-xl font-semibold gf-text-secondary">
        Audit a project to get started
      </h2>
      <p class="text-sm gf-text-muted">
        Set your project path, then click Audit.
      </p>
      <button
        @click="runAudit()"
        :disabled="auditing"
        class="gf-btn gf-btn-md gf-btn-scan"
      >
        Audit
      </button>
    </div>
  </div>

  <!-- Has report -->
  <div
    x-show="report"
    style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px"
  >
    <!-- Header -->
    <div
      style="
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      "
    >
      <div>
        <span class="gf-text-primary" style="font-size: 20px; font-weight: 500"
          >Audit</span
        >
        <span
          x-show="report?.status"
          style="
            margin-left: 12px;
            font-size: 13px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 4px;
          "
          :style="{
            background: report?.status === 'pass' ? '#14532d' : '#7f1d1d',
            color: report?.status === 'pass' ? '#4ade80' : '#f87171',
          }"
          x-text="report?.status === 'pass' ? 'PASS' : 'FAIL'"
        ></span>
      </div>
      <button
        @click="runAudit()"
        :disabled="auditing"
        class="gf-btn gf-btn-md gf-btn-scan"
      >
        <span x-text="auditing ? 'Auditing...' : 'Re-audit'"></span>
      </button>
    </div>

    <!-- GOAT Flow Setup card -->
    <button
      @click="auditDetailScope = (auditDetailScope === 'setup' ? null : 'setup'); auditDetailAgent = null"
      class="gf-card"
      style="
        padding: 16px 24px;
        cursor: pointer;
        transition: border-color 0.1s;
        width: 100%;
        text-align: left;
        margin-bottom: 12px;
      "
      :style="{ borderColor: auditDetailScope === 'setup' ? '#4ade80' : '' }"
    >
      <div style="display: flex; align-items: center; justify-content: space-between">
        <div>
          <span class="gf-text-primary" style="font-size: 16px; font-weight: 600"
            >GOAT Flow Setup</span
          >
          <span
            class="gf-text-secondary"
            style="font-size: 12px; margin-left: 12px"
            x-text="`${(report?.scopes?.setup?.checks || []).filter(c => c.status === 'pass').length}/${(report?.scopes?.setup?.checks || []).length} checks passed`"
          ></span>
        </div>
        <span
          style="
            font-size: 13px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
          "
          :style="{
            background: report?.scopes?.setup?.status === 'pass' ? '#14532d' : '#7f1d1d',
            color: report?.scopes?.setup?.status === 'pass' ? '#4ade80' : '#f87171',
          }"
          x-text="report?.scopes?.setup?.status === 'pass' ? 'PASS' : 'FAIL'"
        ></span>
      </div>
    </button>

    <!-- Setup detail panel -->
    <template x-if="auditDetailScope === 'setup' && report?.scopes?.setup">
      <div style="margin-bottom: 16px">
        <div
          class="gf-card"
          style="border-radius: 8px; padding: 16px 20px"
        >
          <h3
            class="gf-text-muted"
            style="
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.5px;
              margin-bottom: 12px;
            "
          >
            Checks
            <span
              class="gf-text-secondary"
              style="margin-left: 4px"
              x-text="`(${report.scopes.setup.checks.filter(c => c.status === 'pass').length}/${report.scopes.setup.checks.length} passed)`"
            ></span>
          </h3>
          <div style="display: flex; flex-direction: column; gap: 4px">
            <template
              x-for="(check, idx) in report.scopes.setup.checks"
              :key="'setup-check-' + idx"
            >
              <div
                :style="{
                  paddingBottom: check.failure ? '12px' : '4px',
                  borderBottom: check.failure ? '0.5px solid #2a2a2e' : 'none',
                  marginBottom: check.failure ? '4px' : '0'
                }"
              >
                <div style="display: flex; align-items: center; gap: 8px; font-size: 13px">
                  <span
                    style="flex-shrink: 0; font-weight: 600; width: 14px; text-align: center"
                    :style="{ color: check.status === 'pass' ? '#4ade80' : '#f87171' }"
                    x-html="check.status === 'pass' ? '&#10003;' : '&#10005;'"
                  ></span>
                  <span class="gf-text-primary" style="font-weight: 500" x-text="check.name"></span>
                </div>
                <template x-if="check.failure">
                  <div style="margin-left: 22px">
                    <p class="gf-text-muted" style="font-size: 12px; margin-top: 2px" x-text="check.failure.message"></p>
                    <div
                      x-show="check.failure.howToFix"
                      class="gf-bg-elevated"
                      style="margin-top: 8px; padding: 8px 12px; border-radius: 6px; font-size: 12px"
                    >
                      <div class="gf-text-muted" style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600">How to fix</div>
                      <p class="gf-text-secondary" style="line-height: 1.5; margin: 0" x-text="check.failure.howToFix"></p>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- Per-agent AI Harness Score cards -->
    <div x-show="report?.agentScores?.length > 0" style="margin-bottom: 4px">
      <div
        class="gf-text-primary"
        style="font-size: 16px; font-weight: 600; margin-bottom: 10px"
      >
        AI Harness Score
      </div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px">
        <template
          x-for="agent in (report?.agentScores || [])"
          :key="'audit-harness-' + agent.id"
        >
          <button
            @click="auditDetailAgent = (auditDetailAgent === agent.id ? null : agent.id); auditDetailScope = null"
            class="gf-card"
            style="padding: 20px 24px; cursor: pointer; transition: border-color 0.1s"
            :style="{ borderColor: auditDetailAgent === agent.id ? '#4ade80' : '' }"
          >
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px">
              <span class="gf-text-primary" style="font-size: 16px; font-weight: 600" x-text="agent.name"></span>
              <span
                style="font-size: 18px; font-weight: 700"
                :style="{
                  color: (agent.harness.score ?? 0) >= 80 ? '#4ade80' :
                         (agent.harness.score ?? 0) >= 60 ? '#fb923c' : '#f87171'
                }"
                x-text="`${agent.harness.score ?? 0}%`"
              ></span>
            </div>
            <div class="gf-text-muted" style="font-size: 12px">
              <span class="gf-text-secondary"
                x-text="`${agent.harness.checks.filter(c => c.status === 'pass').length}/${agent.harness.checks.length} checks`"
              ></span>
            </div>
          </button>
        </template>
      </div>
    </div>

    <!-- Agent harness detail panel -->
    <template x-if="auditDetailAgent && report?.agentScores?.find(a => a.id === auditDetailAgent)">
      <div
        style="
          margin-top: 16px;
          border-top: 0.5px solid #2a2a2e;
          padding-top: 16px;
        "
        x-data="{ get agent() { return report.agentScores.find(a => a.id === auditDetailAgent) } }"
      >
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px">
          <div class="gf-text-primary" style="font-size: 18px; font-weight: 500"
            x-text="agent.name + ' - AI Harness'"></div>
          <template x-if="lastAuditTime">
            <span class="gf-text-muted" style="font-size: 12px"
              x-text="'Last audited ' + formatTimeAgo(lastAuditTime)"></span>
          </template>
        </div>
        <div class="gf-card" style="border-radius: 8px; padding: 16px 20px">
          <h3 class="gf-text-muted" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px">
            Checks
            <span class="gf-text-secondary" style="margin-left: 4px"
              x-text="`(${agent.harness.checks.filter(c => c.status === 'pass').length}/${agent.harness.checks.length} passed)`"></span>
          </h3>
          <div style="display: flex; flex-direction: column; gap: 4px">
            <template
              x-for="(check, idx) in agent.harness.checks"
              :key="auditDetailAgent + '-check-' + idx"
            >
              <div
                :style="{
                  paddingBottom: check.failure ? '12px' : '4px',
                  borderBottom: check.failure ? '0.5px solid #2a2a2e' : 'none',
                  marginBottom: check.failure ? '4px' : '0'
                }"
              >
                <div style="display: flex; align-items: center; gap: 8px; font-size: 13px">
                  <span
                    style="flex-shrink: 0; font-weight: 600; width: 14px; text-align: center"
                    :style="{ color: check.status === 'pass' ? '#4ade80' : '#f87171' }"
                    x-html="check.status === 'pass' ? '&#10003;' : '&#10005;'"
                  ></span>
                  <span class="gf-text-primary" style="font-weight: 500" x-text="check.name"></span>
                </div>
                <template x-if="check.failure">
                  <div style="margin-left: 22px">
                    <p class="gf-text-muted" style="font-size: 12px; margin-top: 2px" x-text="check.failure.message"></p>
                    <div
                      x-show="check.failure.howToFix"
                      class="gf-bg-elevated"
                      style="margin-top: 8px; padding: 8px 12px; border-radius: 6px; font-size: 12px"
                    >
                      <div class="gf-text-muted" style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600">How to fix</div>
                      <p class="gf-text-secondary" style="line-height: 1.5; margin: 0" x-text="check.failure.howToFix"></p>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- Quality concerns (shown when quality mode is used) -->
    <template x-if="report?.concerns">
      <div
        style="
          margin-top: 20px;
          border-top: 0.5px solid #2a2a2e;
          padding-top: 20px;
        "
      >
        <h3
          class="gf-text-primary"
          style="font-size: 18px; font-weight: 500; margin-bottom: 16px"
        >
          Quality
          <span
            x-show="report.overall?.grade"
            class="gf-text-secondary"
            style="font-size: 14px; font-weight: 400; margin-left: 8px"
            x-text="`${report.overall.grade} (${report.overall.qualityScore}%)`"
          ></span>
        </h3>

        <div style="display: flex; flex-direction: column; gap: 12px">
          <template
            x-for="concernKey in ['context', 'constraints', 'verification', 'recovery', 'feedback_loop']"
            :key="concernKey"
          >
            <div class="gf-card" style="border-radius: 8px; padding: 14px 18px">
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 8px;
                "
              >
                <span
                  class="gf-text-primary"
                  style="
                    font-size: 14px;
                    font-weight: 500;
                    text-transform: capitalize;
                  "
                  x-text="concernKey.replace('_', ' ')"
                ></span>
                <span
                  style="font-size: 13px; font-weight: 600"
                  :style="{
                    color: report.concerns[concernKey].score >= 80 ? '#4ade80' :
                           report.concerns[concernKey].score >= 60 ? '#fb923c' : '#f87171'
                  }"
                  x-text="`${report.concerns[concernKey].score}%`"
                ></span>
              </div>
              <!-- Findings -->
              <template
                x-for="(finding, fi) in report.concerns[concernKey].findings"
                :key="concernKey + '-f-' + fi"
              >
                <div
                  class="gf-text-muted"
                  style="font-size: 12px; margin-bottom: 4px"
                  x-text="finding"
                ></div>
              </template>
              <!-- Recommendations with howToFix -->
              <template
                x-for="(rec, ri) in report.concerns[concernKey].recommendations"
                :key="concernKey + '-r-' + ri"
              >
                <div style="margin-top: 6px">
                  <div
                    style="
                      display: flex;
                      align-items: flex-start;
                      gap: 6px;
                      font-size: 12px;
                    "
                  >
                    <span style="color: #fb923c; flex-shrink: 0">-></span>
                    <span class="gf-text-secondary" x-text="rec"></span>
                  </div>
                  <div
                    x-show="report.concerns[concernKey].howToFix?.[ri]"
                    class="gf-bg-elevated"
                    style="
                      margin-top: 4px;
                      margin-left: 18px;
                      padding: 6px 10px;
                      border-radius: 4px;
                      font-size: 11px;
                    "
                  >
                    <span class="gf-text-muted" style="font-weight: 600"
                      >Fix:
                    </span>
                    <span
                      class="gf-text-secondary"
                      x-text="report.concerns[concernKey].howToFix?.[ri]"
                    ></span>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Footer -->
    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 16px 0 8px"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>
</div>
<!-- /audit view -->
