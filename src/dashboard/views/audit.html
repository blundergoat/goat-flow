<!-- ═══ Audit View ═══ -->
<div
  x-show="activeView === 'audit'"
  style="height: calc(100vh - 3.5rem); overflow-y: auto"
>
  <!-- No data empty state -->
  <div
    x-show="!report && !auditing"
    class="flex items-center justify-center"
    style="min-height: 60vh"
  >
    <div class="text-center space-y-4 max-w-md">
      <p class="text-4xl">&#128016;</p>
      <h2 class="text-xl font-semibold gf-text-secondary">
        Audit a project to get started
      </h2>
      <p class="text-sm gf-text-muted">
        Set your project path, then click Audit.
      </p>
      <button
        @click="runAudit()"
        :disabled="auditing"
        class="gf-btn gf-btn-md gf-btn-audit"
      >
        Audit
      </button>
      <div
        x-show="terminalAvailable"
        style="
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 8px;
          margin-top: 8px;
        "
      >
        <template
          x-for="action in terminalAuditActions"
          :key="'empty-' + action.id"
        >
          <button
            @click="runTerminalAuditCommand(action)"
            :title="action.description"
            class="gf-btn gf-btn-md gf-btn-audit"
            x-text="action.command"
          ></button>
        </template>
      </div>
    </div>
  </div>

  <!-- Has report -->
  <div
    x-show="report"
    style="max-width: 880px; margin: 0 auto; padding: 12px 28px 24px"
  >
    <!-- Title -->
    <div
      class="gf-text-primary"
      style="font-size: 20px; font-weight: 600; margin-bottom: 4px"
    >
      Audit
    </div>

    <!-- Terminal commands -->
    <div
      x-show="terminalAvailable"
      style="margin-bottom: 16px"
    >
      <div class="gf-text-muted" style="font-size: 12px; margin-bottom: 8px">
        Send common audit commands to the workspace terminal.
      </div>
      <div
        style="
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
        "
      >
        <template
          x-for="action in terminalAuditActions"
          :key="'report-' + action.id"
        >
          <button
            @click="runTerminalAuditCommand(action)"
            :title="action.description"
            class="gf-action-btn"
            style="
              text-align: left;
              display: flex;
              align-items: center;
              gap: 10px;
            "
          >
            <span class="gf-play-icon">
              <svg
                width="12"
                height="12"
                fill="currentColor"
                viewBox="0 0 20 20"
              >
                <path
                  d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"
                />
              </svg>
            </span>
            <div style="flex: 1; min-width: 0">
              <div class="gf-action-title" x-text="action.command"></div>
              <div class="gf-action-desc" x-text="action.description"></div>
            </div>
          </button>
        </template>
      </div>
    </div>
    <!-- Header -->
    <div
      style="
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin-bottom: 16px;
      "
    >
      <button
        @click="runAudit()"
        :disabled="auditing"
        class="gf-btn gf-btn-md gf-btn-audit"
      >
        <span x-text="auditing ? 'Auditing...' : 'Re-audit'"></span>
      </button>
    </div>

    <!-- GOAT Flow Setup card -->
    <button
      @click="auditDetailScope = (auditDetailScope === 'setup' ? null : 'setup'); auditDetailAgent = null"
      class="gf-card"
      style="
        padding: 16px 24px;
        cursor: pointer;
        transition: border-color 0.1s;
        width: 100%;
        text-align: left;
        margin-bottom: 12px;
      "
      :style="{ borderColor: auditDetailScope === 'setup' ? '#4ade80' : '' }"
    >
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
        "
      >
        <div>
          <span
            class="gf-text-primary"
            style="font-size: 16px; font-weight: 600"
            >GOAT Flow Setup</span
          >
          <span
            class="gf-text-secondary"
            style="font-size: 12px; margin-left: 12px"
            x-text="`${(report?.scopes?.setup?.checks || []).filter(c => c.status === 'pass').length}/${(report?.scopes?.setup?.checks || []).length} checks passed`"
          ></span>
        </div>
        <span
          style="
            font-size: 13px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
          "
          :style="{
            background: report?.scopes?.setup?.status === 'pass' ? '#14532d' : '#7f1d1d',
            color: report?.scopes?.setup?.status === 'pass' ? '#4ade80' : '#f87171',
          }"
          x-text="report?.scopes?.setup?.status === 'pass' ? 'PASS' : 'FAIL'"
        ></span>
      </div>
    </button>

    <!-- Setup detail panel -->
    <template x-if="auditDetailScope === 'setup' && report?.scopes?.setup">
      <div style="margin-bottom: 16px">
        <div class="gf-card" style="border-radius: 8px; padding: 16px 20px">
          <h3
            class="gf-text-muted"
            style="
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.5px;
              margin-bottom: 12px;
            "
          >
            Checks
            <span
              class="gf-text-secondary"
              style="margin-left: 4px"
              x-text="`(${report.scopes.setup.checks.filter(c => c.status === 'pass').length}/${report.scopes.setup.checks.length} passed)`"
            ></span>
          </h3>
          <div style="display: flex; flex-direction: column; gap: 4px">
            <template
              x-for="(check, idx) in report.scopes.setup.checks"
              :key="'setup-check-' + idx"
            >
              <div
                :style="{
                  paddingBottom: check.failure ? '12px' : '4px',
                  borderBottom: check.failure ? '0.5px solid #2a2a2e' : 'none',
                  marginBottom: check.failure ? '4px' : '0'
                }"
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    font-size: 13px;
                  "
                >
                  <span
                    style="
                      flex-shrink: 0;
                      font-weight: 600;
                      width: 14px;
                      text-align: center;
                    "
                    :style="{ color: check.status === 'pass' ? '#4ade80' : '#f87171' }"
                    x-html="check.status === 'pass' ? '&#10003;' : '&#10005;'"
                  ></span>
                  <span
                    class="gf-text-primary"
                    style="font-weight: 500"
                    x-text="check.name"
                  ></span>
                </div>
                <template x-if="check.failure">
                  <div style="margin-left: 22px">
                    <p
                      class="gf-text-muted"
                      style="font-size: 12px; margin-top: 2px"
                      x-text="check.failure.message"
                    ></p>
                    <div
                      x-show="check.failure.howToFix"
                      class="gf-bg-elevated"
                      style="
                        margin-top: 8px;
                        padding: 8px 12px;
                        border-radius: 6px;
                        font-size: 12px;
                      "
                    >
                      <div
                        class="gf-text-muted"
                        style="
                          font-size: 10px;
                          text-transform: uppercase;
                          letter-spacing: 0.5px;
                          margin-bottom: 4px;
                          font-weight: 600;
                        "
                      >
                        How to fix
                      </div>
                      <p
                        class="gf-text-secondary"
                        style="line-height: 1.5; margin: 0"
                        x-text="check.failure.howToFix"
                      ></p>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- Per-agent AI Harness cards -->
    <div
      x-show="report?.agentScores?.length > 0"
      style="margin-bottom: 4px"
      x-data="{
        concernMeta: {
          context:       { label: 'Context',       subtitle: 'Is the agent\'s map accurate and lean?' },
          constraints:   { label: 'Constraints',   subtitle: 'Do deterministic rules catch failures before the LLM runs?' },
          verification:  { label: 'Verification',  subtitle: 'Can the agent verify its own work honestly?' },
          recovery:      { label: 'Recovery',      subtitle: 'Can the agent resume after crash or compaction?' },
          feedback_loop: { label: 'Feedback Loop', subtitle: 'Is the harness getting smarter from failures?' }
        },
        concernKeys: ['context', 'constraints', 'verification', 'recovery', 'feedback_loop'],
        expandedConcern: null,
        statusColor(s) { return s === 'pass' ? 'var(--green-400)' : 'var(--red-400)' },
        scoreColor(score) { return score >= 80 ? 'var(--green-400)' : score >= 70 ? 'var(--yellow-400, #facc15)' : score >= 60 ? 'var(--orange-400, #fb923c)' : 'var(--red-400)' },
        scoreBg(score) { return score >= 80 ? 'var(--green-900, #14532d)' : score >= 70 ? 'var(--yellow-900, #713f12)' : score >= 60 ? 'var(--orange-900, #7c2d12)' : 'var(--red-900, #7f1d1d)' },
        agentScore(agent) { if (!agent.harness) return null; const t = agent.harness.checks.length; return t ? Math.round(agent.harness.checks.filter(c => c.status === 'pass').length / t * 100) : null; },
        toGrade(s) { if (s >= 90) return 'A'; if (s >= 80) return 'B'; if (s >= 70) return 'C'; if (s >= 60) return 'D'; return 'F'; },
        hasIssues(concerns, key) { return concerns?.[key]?.recommendations?.length > 0 }
      }"
    >
      <div
        class="gf-text-primary"
        style="font-size: 16px; font-weight: 600; margin-bottom: 10px"
      >
        AI Harness
      </div>

      <!-- Agent cards with inline concern bars -->
      <div
        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px"
      >
        <template
          x-for="agent in (report?.agentScores || [])"
          :key="'audit-harness-' + agent.id"
        >
          <button
            @click="auditDetailAgent = (auditDetailAgent === agent.id ? null : agent.id); auditDetailScope = null; expandedConcern = null"
            class="gf-card"
            style="
              padding: 16px 18px;
              cursor: pointer;
              transition: border-color 0.15s;
              text-align: left;
            "
            :style="{ borderColor: auditDetailAgent === agent.id ? 'var(--green-400)' : '' }"
          >
            <!-- Name + score -->
            <div
              style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 2px;
              "
            >
              <span
                class="gf-text-primary"
                style="font-size: 15px; font-weight: 600"
                x-text="agent.name"
              ></span>
              <div
                x-show="agentScore(agent) !== null"
                style="display: flex; align-items: baseline; gap: 4px"
              >
                <span
                  style="font-size: 20px; font-weight: 700"
                  :style="{ color: scoreColor(agentScore(agent)) }"
                  x-text="toGrade(agentScore(agent))"
                ></span>
                <span
                  style="font-size: 12px; font-weight: 600"
                  :style="{ color: scoreColor(agentScore(agent)) }"
                  x-text="agentScore(agent) + '%'"
                ></span>
              </div>
            </div>
            <!-- Check summary -->
            <div
              class="gf-text-muted"
              style="font-size: 11px; margin-bottom: 10px"
              x-text="agent.concerns
                ? (() => { const recs = concernKeys.reduce((n, k) => n + (agent.concerns[k]?.recommendations?.length || 0), 0); return recs === 0 ? 'All checks passing' : recs + ' recommendation' + (recs !== 1 ? 's' : ''); })()
                : `${agent.agent.checks.filter(c => c.status === 'pass').length}/${agent.agent.checks.length} checks`"
            ></div>
            <!-- Concern mini-bars (click a row to expand that concern in the detail panel) -->
            <template x-if="agent.concerns">
              <div style="display: flex; flex-direction: column; gap: 4px">
                <template
                  x-for="ck in concernKeys"
                  :key="agent.id + '-bar-' + ck"
                >
                  <div
                    @click.stop="auditDetailAgent = agent.id; auditDetailScope = null; expandedConcern = (expandedConcern === agent.id + '-' + ck ? null : agent.id + '-' + ck)"
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      padding: 2px 0;
                      cursor: pointer;
                      border-radius: 3px;
                      transition: opacity 0.1s;
                    "
                    :style="{ opacity: expandedConcern === agent.id + '-' + ck ? '1' : '0.8' }"
                    @mouseenter="$el.style.opacity = '1'"
                    @mouseleave="$el.style.opacity = expandedConcern === agent.id + '-' + ck ? '1' : '0.8'"
                  >
                    <span
                      class="gf-text-muted"
                      style="
                        font-size: 10px;
                        width: 62px;
                        flex-shrink: 0;
                        text-align: right;
                      "
                      x-text="concernMeta[ck].label"
                    ></span>
                    <div
                      style="
                        flex: 1;
                        height: 4px;
                        background: var(--surface-elevated, #27272a);
                        border-radius: 2px;
                        overflow: hidden;
                      "
                    >
                      <div
                        style="height: 100%; border-radius: 2px; transition: width 0.3s"
                        :style="{ width: agent.concerns[ck].score + '%', background: scoreColor(agent.concerns[ck].score) }"
                      ></div>
                    </div>
                    <span
                      style="
                        font-size: 10px;
                        font-weight: 600;
                        width: 32px;
                        flex-shrink: 0;
                        text-align: right;
                      "
                      :style="{ color: scoreColor(agent.concerns[ck].score) }"
                      x-text="agent.concerns[ck].score + '%'"
                    ></span>
                  </div>
                </template>
              </div>
            </template>
          </button>
        </template>
      </div>

      <!-- Agent detail panel (expanded when clicked) -->
      <template
        x-for="agent in (report?.agentScores || [])"
        :key="'detail-' + agent.id"
      >
        <template x-if="auditDetailAgent === agent.id">
          <div
            style="
              margin-top: 16px;
              border-top: 0.5px solid var(--border-subtle);
              padding-top: 16px;
            "
          >
            <!-- Agent header -->
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
              "
            >
              <div
                class="gf-text-primary"
                style="font-size: 18px; font-weight: 500"
                x-text="agent.name"
              ></div>
              <template x-if="lastAuditTime">
                <span
                  class="gf-text-muted"
                  style="font-size: 12px"
                  x-text="'Last audited ' + formatTimeAgo(lastAuditTime)"
                ></span>
              </template>
            </div>

            <!-- Build checks -->
            <div
              class="gf-card"
              style="
                border-radius: 8px;
                padding: 16px 20px;
                margin-bottom: 16px;
              "
            >
              <h3
                class="gf-text-muted"
                style="
                  font-size: 11px;
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                  margin-bottom: 12px;
                "
              >
                Agent Setup Checks
                <span
                  class="gf-text-secondary"
                  style="margin-left: 4px"
                  x-text="`(${agent.agent.checks.filter(c => c.status === 'pass').length}/${agent.agent.checks.length} passed)`"
                ></span>
              </h3>
              <div style="display: flex; flex-direction: column; gap: 4px">
                <template
                  x-for="(check, idx) in agent.agent.checks"
                  :key="agent.id + '-check-' + idx"
                >
                  <div
                    :style="{
                      paddingBottom: check.failure ? '12px' : '4px',
                      borderBottom: check.failure ? '0.5px solid var(--border-subtle)' : 'none',
                      marginBottom: check.failure ? '4px' : '0'
                    }"
                  >
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        font-size: 13px;
                      "
                    >
                      <span
                        style="
                          flex-shrink: 0;
                          font-weight: 600;
                          width: 14px;
                          text-align: center;
                        "
                        :style="{ color: check.status === 'pass' ? 'var(--green-400)' : 'var(--red-400)' }"
                        x-html="check.status === 'pass' ? '&#10003;' : '&#10005;'"
                      ></span>
                      <span
                        class="gf-text-primary"
                        style="font-weight: 500"
                        x-text="check.name"
                      ></span>
                    </div>
                    <template x-if="check.failure">
                      <div style="margin-left: 22px">
                        <p
                          class="gf-text-muted"
                          style="font-size: 12px; margin-top: 2px"
                          x-text="check.failure.message"
                        ></p>
                        <div
                          x-show="check.failure.howToFix"
                          class="gf-bg-elevated"
                          style="
                            margin-top: 8px;
                            padding: 8px 12px;
                            border-radius: 6px;
                            font-size: 12px;
                          "
                        >
                          <div
                            class="gf-text-muted"
                            style="
                              font-size: 10px;
                              text-transform: uppercase;
                              letter-spacing: 0.5px;
                              margin-bottom: 4px;
                              font-weight: 600;
                            "
                          >
                            How to fix
                          </div>
                          <p
                            class="gf-text-secondary"
                            style="line-height: 1.5; margin: 0"
                            x-text="check.failure.howToFix"
                          ></p>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>

            <!-- Expanded concern detail (click a concern bar in the agent card) -->
            <template x-if="agent.concerns">
              <div>
                <template
                  x-for="ck in concernKeys"
                  :key="agent.id + '-det-' + ck"
                >
                  <template x-if="expandedConcern === agent.id + '-' + ck">
                    <div
                      class="gf-card"
                      style="
                        border-radius: 8px;
                        padding: 16px 20px;
                        margin-bottom: 10px;
                      "
                    >
                      <div style="margin-bottom: 12px">
                        <div
                          style="
                            display: flex;
                            align-items: center;
                            justify-content: space-between;
                          "
                        >
                          <span
                            class="gf-text-primary"
                            style="font-size: 14px; font-weight: 600"
                            x-text="concernMeta[ck].label"
                          ></span>
                          <span
                            style="
                              font-size: 12px;
                              font-weight: 700;
                              padding: 1px 8px;
                              border-radius: 4px;
                            "
                            :style="{
                              background: scoreBg(agent.concerns[ck].score),
                              color: scoreColor(agent.concerns[ck].score),
                            }"
                            x-text="agent.concerns[ck].score + '%'"
                          ></span>
                        </div>
                        <p
                          class="gf-text-muted"
                          style="font-size: 11px; margin-top: 2px"
                          x-text="concernMeta[ck].subtitle"
                        ></p>
                      </div>

                      <!-- Findings -->
                      <div
                        x-show="agent.concerns[ck].findings.length > 0"
                        style="margin-bottom: 10px"
                      >
                        <div
                          class="gf-text-muted"
                          style="
                            font-size: 10px;
                            text-transform: uppercase;
                            letter-spacing: 0.5px;
                            margin-bottom: 5px;
                            font-weight: 600;
                          "
                        >
                          Findings
                        </div>
                        <div
                          style="
                            display: flex;
                            flex-direction: column;
                            gap: 2px;
                          "
                        >
                          <template
                            x-for="(finding, fi) in agent.concerns[ck].findings"
                            :key="agent.id + '-' + ck + '-f-' + fi"
                          >
                            <div
                              style="
                                display: flex;
                                align-items: flex-start;
                                gap: 6px;
                                font-size: 12px;
                              "
                            >
                              <span
                                class="gf-text-muted"
                                style="flex-shrink: 0; line-height: 1.5"
                                >&#8226;</span
                              >
                              <span
                                class="gf-text-secondary"
                                style="line-height: 1.5"
                                x-text="finding"
                              ></span>
                            </div>
                          </template>
                        </div>
                      </div>

                      <!-- Recommendations -->
                      <div
                        x-show="agent.concerns[ck].recommendations.length > 0"
                      >
                        <div
                          class="gf-text-muted"
                          style="
                            font-size: 10px;
                            text-transform: uppercase;
                            letter-spacing: 0.5px;
                            margin-bottom: 5px;
                            font-weight: 600;
                          "
                        >
                          Recommendations
                        </div>
                        <div
                          style="
                            display: flex;
                            flex-direction: column;
                            gap: 6px;
                          "
                        >
                          <template
                            x-for="(rec, ri) in agent.concerns[ck].recommendations"
                            :key="agent.id + '-' + ck + '-r-' + ri"
                          >
                            <div>
                              <div
                                style="
                                  display: flex;
                                  align-items: flex-start;
                                  gap: 6px;
                                  font-size: 12px;
                                "
                              >
                                <span
                                  style="
                                    color: var(--orange-400);
                                    flex-shrink: 0;
                                    font-weight: 600;
                                  "
                                  >&#8594;</span
                                >
                                <span
                                  class="gf-text-primary"
                                  style="font-weight: 500"
                                  x-text="rec"
                                ></span>
                              </div>
                              <div
                                x-show="agent.concerns[ck].howToFix?.[ri]"
                                class="gf-bg-elevated"
                                style="
                                  margin-top: 4px;
                                  margin-left: 18px;
                                  padding: 6px 10px;
                                  border-radius: 4px;
                                  font-size: 11px;
                                "
                              >
                                <span
                                  class="gf-text-muted"
                                  style="font-weight: 600"
                                  >Fix:
                                </span>
                                <span
                                  class="gf-text-secondary"
                                  x-text="agent.concerns[ck].howToFix?.[ri]"
                                ></span>
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>

                      <!-- All clear -->
                      <div
                        x-show="agent.concerns[ck].recommendations.length === 0"
                        style="font-size: 12px; padding: 6px 0"
                        class="gf-text-secondary"
                      >
                        All checks passing for this concern.
                      </div>
                    </div>
                  </template>
                </template>
              </div>
            </template>
          </div>
        </template>
      </template>
    </div>

    <!-- Footer -->
    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 16px 0 8px"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>
</div>
<!-- /audit view -->
