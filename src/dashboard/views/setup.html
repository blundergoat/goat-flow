<!-- ═══ Setup View ═══ -->
<div
  x-show="activeView === 'setup'"
  x-cloak
  style="height: calc(100vh - 3.5rem); overflow-y: auto"
>
  <div style="max-width: 1100px; margin: 0 auto; padding: 20px 24px">
    <div
      class="gf-text-primary"
      style="font-size: 20px; font-weight: 500; margin-bottom: 16px"
    >
      Setup
    </div>

    <!-- Two columns -->
    <div style="display: flex; gap: 16px; height: calc(100vh - 10rem)">
      <!-- Left: Title + Agents + Detected configuration -->
      <div
        class="gf-card"
        style="
          width: 50%;
          flex-shrink: 0;
          padding: 16px 20px;
          align-self: flex-start;
        "
      >
        <!-- Title -->
        <div style="margin-bottom: 16px">
          <div
            class="gf-text-primary"
            style="font-size: 20px; font-weight: 500"
            x-text="
                !report ? 'Setup GOAT Flow' :
                report.status === 'fail' ? 'Fix Issues' :
                'GOAT Flow is up to date'
              "
          ></div>
          <div
            class="gf-text-muted"
            style="font-size: 12px; margin-top: 3px"
            x-text="
                !report ? 'Configure GOAT Flow for this project' :
                report.status === 'fail' ? 'Audit has failures - generate a fix prompt' :
                'All checks passing - generate maintenance prompt'
              "
          ></div>
        </div>

        <!-- Loading state -->
        <div
          x-show="setupDetecting"
          style="
            padding: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
          "
        >
          <svg
            class="animate-spin"
            style="width: 16px; height: 16px; color: #4ade80"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            />
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            />
          </svg>
          <span class="gf-text-muted" style="font-size: 12px"
            >Detecting project stack...</span
          >
        </div>

        <div x-show="!setupDetecting" style="margin-bottom: 16px">
          <div
            class="gf-text-secondary"
            style="font-size: 13px; font-weight: 500; margin-bottom: 12px"
          >
            Detected configuration
          </div>

          <div style="display: flex; flex-direction: column; gap: 4px">
            <!-- Languages -->
            <div class="gf-detect-row">
              <span class="gf-detect-label">Languages</span>
              <div class="gf-tags" style="margin-top: 0">
                <template x-for="lang in setupData.languages" :key="lang">
                  <span class="gf-tag" x-text="lang"></span>
                </template>
                <span
                  x-show="setupData.languages.length === 0"
                  class="gf-detect-val gf-detect-missing"
                  >None detected</span
                >
              </div>
            </div>

            <!-- Frameworks -->
            <div class="gf-detect-row">
              <span class="gf-detect-label">Frameworks</span>
              <div class="gf-tags" style="margin-top: 0">
                <template x-for="fw in setupData.frameworks" :key="fw">
                  <span class="gf-tag" x-text="fw"></span>
                </template>
                <span
                  x-show="setupData.frameworks.length === 0"
                  class="gf-detect-val gf-detect-missing"
                  >None detected</span
                >
              </div>
            </div>

            <!-- Commands -->
            <template
              x-for="cmd in ['test', 'lint', 'build', 'format']"
              :key="cmd"
            >
              <div class="gf-detect-row">
                <span
                  class="gf-detect-label"
                  style="text-transform: capitalize"
                  x-text="cmd === 'format' ? 'Formatter' : cmd"
                ></span>
                <span
                  class="gf-detect-val"
                  :class="!setupData.commands[cmd] && 'gf-detect-missing'"
                  x-text="setupData.commands[cmd] || '(not detected)'"
                ></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Agent selector strip -->
        <div
          class="gf-agent-strip"
          style="padding: 0; border-top: none; margin-bottom: 16px"
        >
          <template x-for="agent in supportedAgents" :key="'setup-' + agent.id">
            <div
              @click="setupSelectedAgent = agent.id"
              class="gf-agent-card"
              :class="setupSelectedAgent === agent.id && 'gf-agent-card-sel'"
            >
              <div
                class="gf-text-primary"
                style="font-size: 13px; font-weight: 500"
                x-text="agent.name"
              ></div>
              <div
                style="font-size: 11px; margin-top: 2px"
                x-text="(() => { const s = report?.agentScores?.find(a => a.id === agent.id); if (!s?.harness) return 'Not audited'; const t = s.harness.checks.length; const pct = t ? Math.round(s.harness.checks.filter(c => c.status === 'pass').length / t * 100) : 0; return pct + '%'; })()"
                :style="{ color: (() => { const s = report?.agentScores?.find(a => a.id === agent.id); if (!s?.harness) return '#52525b'; const t = s.harness.checks.length; const pct = t ? Math.round(s.harness.checks.filter(c => c.status === 'pass').length / t * 100) : 0; return pct >= 80 ? '#4ade80' : pct >= 70 ? '#facc15' : pct >= 60 ? '#fb923c' : '#f87171'; })() }"
              ></div>
            </div>
          </template>
        </div>

        <!-- Audit status summary -->
        <div
          x-show="report"
          x-data="{
            concernMeta: {
              context:       { label: 'Context' },
              constraints:   { label: 'Constraints' },
              verification:  { label: 'Verification' },
              recovery:      { label: 'Recovery' },
              feedback_loop: { label: 'Feedback Loop' }
            },
            concernKeys: ['context', 'constraints', 'verification', 'recovery', 'feedback_loop'],
            scoreColor(score) { return score >= 80 ? 'var(--green-400)' : score >= 70 ? 'var(--yellow-400, #facc15)' : score >= 60 ? 'var(--orange-400, #fb923c)' : 'var(--red-400)' },
            agentScore(agent) { if (!agent?.harness) return null; const t = agent.harness.checks.length; return t ? Math.round(agent.harness.checks.filter(c => c.status === 'pass').length / t * 100) : null; },
            toGrade(s) { if (s >= 90) return 'A'; if (s >= 80) return 'B'; if (s >= 70) return 'C'; if (s >= 60) return 'D'; return 'F'; },
            get selectedAgent() {
              return report?.agentScores?.find(a => a.id === setupSelectedAgent) || null;
            },
            recommendationSummary(agent) {
              if (!agent) return 'Not audited';
              if (!agent.concerns) {
                const passed = agent.agent.checks.filter(c => c.status === 'pass').length;
                return `${passed}/${agent.agent.checks.length} installed`;
              }
              const recs = this.concernKeys.reduce((n, k) => n + (agent.concerns[k]?.recommendations?.length || 0), 0);
              return recs === 0 ? 'All checks passing' : `${recs} recommendation${recs !== 1 ? 's' : ''}`;
            }
          }"
          style="margin-bottom: 16px"
        >
          <div
            class="gf-text-secondary"
            style="font-size: 13px; font-weight: 500; margin-bottom: 12px"
          >
            Audit status
          </div>
          <div style="display: flex; flex-direction: column; gap: 12px">
            <div class="gf-detect-row">
              <span class="gf-detect-label">GOAT Flow Setup</span>
              <span
                style="font-size: 12px; font-weight: 600"
                :style="{ color: report?.scopes?.setup?.status === 'pass' ? '#4ade80' : '#f87171' }"
                x-text="(() => { const sc = report?.scopes?.setup; if (!sc?.checks) return ''; const p = sc.checks.filter(c => c.status === 'pass').length; return p + '/' + sc.checks.length + ' installed'; })()"
              ></span>
            </div>

            <template x-if="selectedAgent">
              <div>
                <div
                  class="gf-text-secondary"
                  style="font-size: 12px; font-weight: 500; margin-bottom: 8px"
                  x-text="`${selectedAgent.name} Harness Completeness`"
                ></div>
                <div
                  class="gf-card"
                  style="padding: 16px 18px; text-align: left"
                >
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      justify-content: space-between;
                      margin-bottom: 2px;
                    "
                  >
                    <span
                      class="gf-text-primary"
                      style="font-size: 15px; font-weight: 600"
                      x-text="selectedAgent.name"
                    ></span>
                    <div
                      x-show="agentScore(selectedAgent) !== null"
                      style="display: flex; align-items: baseline; gap: 4px"
                    >
                      <span
                        style="font-size: 20px; font-weight: 700"
                        :style="{ color: scoreColor(agentScore(selectedAgent)) }"
                        x-text="toGrade(agentScore(selectedAgent))"
                      ></span>
                      <span
                        style="font-size: 12px; font-weight: 600"
                        :style="{ color: scoreColor(agentScore(selectedAgent)) }"
                        x-text="agentScore(selectedAgent) + '%'"
                      ></span>
                    </div>
                  </div>
                  <div
                    class="gf-text-muted"
                    style="font-size: 11px; margin-bottom: 10px"
                    x-text="recommendationSummary(selectedAgent)"
                  ></div>
                  <div
                    class="gf-text-muted"
                    style="font-size: 11px; margin-bottom: 10px"
                    x-text="`${selectedAgent.agent.checks.filter(c => c.status === 'pass').length}/${selectedAgent.agent.checks.length} agent setup checks installed`"
                  ></div>
                  <template x-if="selectedAgent.concerns">
                    <div
                      style="display: flex; flex-direction: column; gap: 4px"
                    >
                      <template
                        x-for="ck in concernKeys"
                        :key="selectedAgent.id + '-setup-bar-' + ck"
                      >
                        <div
                          style="
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            padding: 2px 0;
                          "
                        >
                          <span
                            class="gf-text-muted"
                            style="
                              font-size: 10px;
                              width: 62px;
                              flex-shrink: 0;
                              text-align: right;
                            "
                            x-text="concernMeta[ck].label"
                          ></span>
                          <div
                            style="
                              flex: 1;
                              height: 4px;
                              background: var(--surface-elevated, #27272a);
                              border-radius: 2px;
                              overflow: hidden;
                            "
                          >
                            <div
                              style="
                                height: 100%;
                                border-radius: 2px;
                                transition: width 0.3s;
                              "
                              :style="{ width: selectedAgent.concerns[ck].score + '%', background: scoreColor(selectedAgent.concerns[ck].score) }"
                            ></div>
                          </div>
                          <span
                            style="
                              font-size: 10px;
                              font-weight: 600;
                              width: 32px;
                              flex-shrink: 0;
                              text-align: right;
                            "
                            :style="{ color: scoreColor(selectedAgent.concerns[ck].score) }"
                            x-text="selectedAgent.concerns[ck].score + '%'"
                          ></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <template x-if="!selectedAgent">
              <div class="gf-detect-row">
                <span class="gf-detect-label">Selected agent</span>
                <span class="gf-text-muted" style="font-size: 12px"
                  >Not audited</span
                >
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Right: Prompt card -->
      <div
        style="flex: 1; min-width: 0; display: flex; flex-direction: column"
        x-effect="if (activeView === 'setup' && setupSelectedAgent && !setupDetecting) { generateSetupPrompt(); }"
      >
        <div class="gf-prompt-card">
          <!-- Header -->
          <div class="gf-prompt-hdr">
            <span
              class="gf-text-primary"
              style="font-size: 16px; font-weight: 600"
              >Setup prompt</span
            >
            <div style="display: flex; align-items: center; gap: 8px">
              <template
                x-if="!setupGenerating && setupOutputs[setupSelectedAgent]"
              >
                <div style="display: flex; gap: 8px">
                  <button
                    x-data="{ copied: false }"
                    @click="copyText(setupOutputs[setupSelectedAgent]); copied = true; setTimeout(() => copied = false, 1500)"
                    class="gf-btn-copy"
                    :style="{ background: copied ? '#14532d' : '', color: copied ? '#4ade80' : '', borderColor: copied ? '#166534' : '' }"
                  >
                    <span x-text="copied ? 'Copied' : 'Copy'"></span>
                  </button>
                  <button
                    @click="generateSetupPrompt()"
                    class="gf-btn gf-btn-md gf-btn-audit"
                  >
                    Regenerate
                  </button>
                </div>
              </template>
            </div>
          </div>

          <!-- Terminal CTA -->
          <template
            x-if="!setupGenerating && setupOutputs[setupSelectedAgent] && terminalAvailable"
          >
            <div
              class="gf-terminal-cta"
              style="padding: 16px; border-radius: 0"
            >
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 12px;
                  margin-bottom: 8px;
                "
              >
                <button
                  @click="launchPreset(setupOutputs[setupSelectedAgent], activeRunner); activeView = 'workspace'"
                  :disabled="launching || (terminalSessionId && !terminalEnded)"
                  class="gf-btn-terminal-cta"
                >
                  <svg
                    style="width: 16px; height: 16px"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M8 5l8 7-8 7"
                    />
                  </svg>
                  Run Setup in Terminal
                </button>
              </div>
              <div
                class="gf-text-muted"
                style="font-size: 12px; line-height: 1.4"
              >
                Launches
                <span
                  x-text="activeRunner"
                  class="gf-text-secondary"
                  style="font-weight: 500"
                ></span>
                to install GOAT Flow into this project - creates instruction
                files, skills, and hooks.
              </div>
            </div>
          </template>

          <!-- Generating state -->
          <div
            class="gf-loader-overlay"
            :class="!setupGenerating && 'gf-hidden'"
          >
            <svg
              class="animate-spin"
              style="width: 16px; height: 16px; color: #4ade80"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              />
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              />
            </svg>
            <span class="gf-text-muted" style="font-size: 12px"
              >Generating...</span
            >
          </div>

          <!-- Prompt content -->
          <template x-if="!setupGenerating && setupOutputs[setupSelectedAgent]">
            <pre
              class="gf-prompt-body"
              x-text="setupOutputs[setupSelectedAgent]"
            ></pre>
          </template>

          <!-- Empty state -->
          <p
            x-show="!setupGenerating && !setupOutputs[setupSelectedAgent]"
            class="gf-text-disabled"
            style="
              flex: 1;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 12px;
            "
          >
            Select an agent to auto-generate the setup prompt.
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div
      class="gf-footer"
      style="text-align: center; font-size: 11px; padding: 12px 0"
    >
      Built by
      <a
        href="https://www.blundergoat.com"
        target="_blank"
        class="gf-footer-link"
        >BlunderGOAT</a
      >
      · <span x-text="dashboardVersion ? `v${dashboardVersion}` : ''"></span>
    </div>
  </div>
</div>
