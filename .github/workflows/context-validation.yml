name: Context Validation

on:
  pull_request:
    paths:
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'GEMINI.md'
      - '.claude/**'
      - '.gemini/**'
      - 'docs/**'
      - 'setup/**'
      - 'workflow/**'
      - 'scripts/**'
      - 'codex-evals/**'
      - 'agent-evals/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CLAUDE.md / GEMINI.md line count
        run: |
          for f in CLAUDE.md GEMINI.md; do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f")
              echo "$f: $LINES lines"
              if [ "$LINES" -gt 150 ]; then
                echo "::error::$f exceeds 150 lines ($LINES). Anti-pattern AP1."
                exit 1
              elif [ "$LINES" -gt 120 ]; then
                echo "::warning::$f exceeds 120-line app target ($LINES lines)"
              fi
            fi
          done

      - name: Check router table references exist
        run: |
          MISSING=0
          # Extract paths from router table (lines with | ... | `path` |)
          grep -oP '`[^`]+`' CLAUDE.md | tr -d '`' | while read -r ref; do
            # Skip patterns with wildcards
            echo "$ref" | grep -q '\*' && continue
            if [ ! -e "$ref" ]; then
              echo "::warning::Router table references missing path: $ref"
              MISSING=$((MISSING + 1))
            fi
          done
          echo "Router table check complete"

      - name: Check skills exist
        run: |
          EXPECTED_SKILLS="goat-preflight goat-debug goat-audit goat-investigate goat-review goat-plan goat-test"
          for skill in $EXPECTED_SKILLS; do
            if [ ! -f ".claude/skills/$skill/SKILL.md" ]; then
              echo "::error::Missing skill: .claude/skills/$skill/SKILL.md"
              exit 1
            fi
          done
          echo "All 7 skills present"

      - name: Check local CLAUDE.md file sizes
        run: |
          find . -name 'CLAUDE.md' -not -path './CLAUDE.md' -not -path './.git/*' | while read -r f; do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 20 ]; then
              echo "::warning::Local instruction file $f exceeds 20 lines ($LINES). Anti-pattern AP7."
            fi
          done

      - name: Check for unreviewed AI-generated entries
        run: |
          if grep -r 'AI-GENERATED: UNVERIFIED' docs/footguns.md docs/lessons.md 2>/dev/null; then
            echo "::error::Unreviewed AI-generated entries found in learning loop files"
            exit 1
          fi
          echo "No unreviewed AI-generated entries"

      - name: Validate settings.json
        run: |
          for f in .claude/settings.json .gemini/settings.json; do
            if [ -f "$f" ]; then
              python3 -c "import json; json.load(open('$f'))" 2>&1 || {
                echo "::error::$f is not valid JSON. Anti-pattern AP5."
                exit 1
              }
              echo "$f is valid JSON"
            fi
          done

      - name: Validate Codex workflow
        run: |
          if [ -f AGENTS.md ] && [ -f scripts/context-validate.sh ]; then
            bash scripts/context-validate.sh
          fi
